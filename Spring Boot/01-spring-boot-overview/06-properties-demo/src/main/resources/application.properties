spring.application.name=app

# Use wildcard to expose all endpoints = "*"
# Can also expose individual endpoints by comma-separated list, e.g. "health,info"
management.endpoints.web.exposure.include=*
management.info.env.enabled=true

# Exclude individual endpoints from exposure by using a comma-separated list, e.g. "beans,env"
# management.endpoints.web.exposure.exclude=health,info

info.app.name=My App
info.app.description=This is a sample Spring Boot application.
info.app.version=1.0.0

#Define my Properties
coach.name=Rishi
team.name=The Club

# Define server port
server.port=7070

# Set the context path of the application
# All endpoints will be available under this path
server.servlet.context-path=/myapp